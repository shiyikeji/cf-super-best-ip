name: CF Ultimate - Asia Elite Sniper (Top 5)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *" # 每4小时自动运行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 下载并提取核心程序
        run: |
          URL="https://github.com/XIU2/CloudflareSpeedTest/releases/download/v2.3.4/cfst_linux_amd64.tar.gz"
          curl -L -f --connect-timeout 20 --retry 3 -o cfst.tar.gz "$URL" || \
          curl -L -f -o cfst.tar.gz "https://ghproxy.net/$URL"
          tar -zxf cfst.tar.gz
          chmod +x cfst

      - name: 2. 注入绝密亚太纯净段
        run: |
          # 剔除了容易飘到美东的杂乱段，只保留历史证明含 HK/SG/JP 极高的精锐段
          echo "104.16.0.0/16
          104.18.0.0/16
          108.162.192.0/18
          141.101.114.0/24
          162.159.192.0/24
          172.64.0.0/14
          172.67.0.0/16
          188.114.96.0/20" > asia_elite_ip.txt

      - name: 3. 广撒网测速 (提取大样本)
        run: |
          # -p 50：提取 50 个样本，为了后面的“延迟甜点区”过滤做准备
          ./cfst -f asia_elite_ip.txt -url https://speed.cloudflare.com/__down?bytes=100000000 -sl 8 -tl 220 -dn 20 -p 50 -o result.csv

      - name: 4. 亚太狙击行动：强制截取甜点区 + 速度重排 (只要 5 个)
        run: |
          # 🚨 极限精简：head -n 5
          awk -F, 'NR>1 && $6 >= 8 && $5 >= 140 && $5 <= 210' result.csv | sort -t, -k6,6nr | head -n 5 | awk -F, '{
            if ($1 ~ /:/) printf("[%s]:443\n", $1)
            else printf("%s:443\n", $1)
          }' > best.txt

          # 保底模式（如果亚太节点全挂了，退回普通选法，同样只取前 5）
          if [ ! -s best.txt ]; then
            echo "⚠️ 亚太严选无结果，启动备用保底模式..."
            awk -F, 'NR>1 && $6 >= 5 && $5 <= 220' result.csv | sort -t, -k6,6nr | head -n 5 | awk -F, '{
              if ($1 ~ /:/) printf("[%s]:443\n", $1)
              else printf("%s:443\n", $1)
            }' > best.txt
          fi

      - name: 5. 推送至 Gist
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_PAT: ${{ secrets.GIST_PAT }}
        run: |
          if [ -s best.txt ]; then
            echo "# Updated: $(date '+%Y-%m-%d %H:%M:%S') UTC (Asia Sniper Top 5)" > final.txt
            cat best.txt >> final.txt
            
            CONTENT=$(sed ':a;N;$!ba;s/\n/\\n/g' final.txt)
            curl -L -X PATCH \
              -H "Authorization: token $GIST_PAT" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/gists/$GIST_ID \
              -d "{\"files\":{\"my_best_cf_ips.txt\":{\"content\":\"$CONTENT\"}}}"
            echo "✅ 成功推送亚太【极致 Top 5】神级 IP 至 Gist！"
          else
            echo "❌ 无可用 IP，流程终止"
            exit 1
          fi
