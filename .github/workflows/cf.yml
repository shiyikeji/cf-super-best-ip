name: CF Ultimate Best IP System

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download CloudflareST
        run: |
          wget -O cfst.tar.gz https://github.com/XIU2/CloudflareSpeedTest/releases/latest/download/CloudflareST_linux_amd64.tar.gz
          tar -zxf cfst.tar.gz

      - name: Run Speed Test
        run: |
          chmod +x CloudflareST
          ./CloudflareST -n 500 -t 4 -dn 20 -p 50 -o result.csv

      - name: Extract and Format
        run: |
          awk -F, 'NR>1 {
            if ($1 ~ /:/) printf("[%s]:443#CF-V6\n",$1);
            else printf("%s:443#CF\n",$1);
          }' result.csv > best.txt

      - name: Push to Gist
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_PAT: ${{ secrets.GIST_PAT }}
        run: |
          CONTENT=$(sed ':a;N;$!ba;s/\n/\\n/g' best.txt)
          curl -L -X PATCH \
            -H "Authorization: token $GIST_PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/gists/$GIST_ID \
            -d "{\"files\":{\"my_best_cf_ips.txt\":{\"content\":\"$CONTENT\"}}}"
