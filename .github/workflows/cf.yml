name: CF Ultimate Best IP System

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download CloudflareST
        run: |
          # 使用 curl 并增加重试机制，改用固定版本链接确保稳定
          curl -L -o cfst.tar.gz https://github.com/XIU2/CloudflareSpeedTest/releases/download/v2.2.5/CloudflareST_linux_amd64.tar.gz
          tar -zxf cfst.tar.gz
          chmod +x CloudflareST

      - name: Run Speed Test
        run: |
          # 稍微降低测速数量确保在 GitHub 环境稳过
          ./CloudflareST -n 200 -t 4 -dn 10 -p 20 -o result.csv

      - name: Extract and Format
        run: |
          awk -F, 'NR>1 {
            if ($1 ~ /:/) printf("[%s]:443#CF-V6\n",$1);
            else printf("%s:443#CF\n",$1);
          }' result.csv > best.txt

      - name: Push to Gist
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_PAT: ${{ secrets.GIST_PAT }}
        run: |
          if [ -s best.txt ]; then
            CONTENT=$(sed ':a;N;$!ba;s/\n/\\n/g' best.txt)
            curl -L -X PATCH \
              -H "Authorization: token $GIST_PAT" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/gists/$GIST_ID \
              -d "{\"files\":{\"my_best_cf_ips.txt\":{\"content\":\"$CONTENT\"}}}"
          else
            echo "No IP found, skipping update."
            exit 1
          fi
