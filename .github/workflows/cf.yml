name: CF Ultimate Best IP - 40ms Ultra Elite (Top 10)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *" # 每4小时自动运行一次

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 下载并提取程序
        run: |
          URL="https://github.com/XIU2/CloudflareSpeedTest/releases/download/v2.3.4/cfst_linux_amd64.tar.gz"
          curl -L -f --connect-timeout 20 --retry 3 -o cfst.tar.gz "$URL" || \
          curl -L -f -o cfst.tar.gz "https://ghproxy.net/$URL" || \
          curl -L -f -o cfst.tar.gz "https://fastly.jsdelivr.net/gh/XIU2/CloudflareSpeedTest@v2.3.4/cfst_linux_amd64.tar.gz"
          tar -zxf cfst.tar.gz
          chmod +x cfst

      - name: 2. 运行 40ms 精英测速
        run: |
          echo "1.1.1.0/24
          1.0.0.0/24
          104.16.0.0/16
          104.17.0.0/16
          104.18.0.0/16
          104.19.0.0/16
          162.159.192.0/19
          162.159.200.0/22
          172.64.0.0/13
          172.67.0.0/16" > elite_ip.txt

          # -p 15 多测几个作为候选池，后面再严格切前10
          ./cfst -f elite_ip.txt -url https://speed.cloudflare.com/__down?bytes=100000000 -sl 10 -tl 160 -dn 20 -p 15 -o result.csv

      - name: 3. 智能过滤 & 严格切片 (只要 10 个)
        run: |
          # 提取纯净 IP
          awk -F, 'NR>1 && $6 >= 10 && $5 <= 160 {
            ip=$1
            if (ip ~ /:/) printf("[%s]:443\n", ip)
            else printf("%s:443\n", ip)
          }' result.csv | sort -u > temp.txt

          # 保底模式
          if [ ! -s temp.txt ]; then
            echo "⚠️ 启动保底模式..."
            ./cfst -f elite_ip.txt -url https://speed.cloudflare.com/__down?bytes=50000000 -sl 5 -tl 200 -dn 20 -p 15 -o result_loose.csv
            awk -F, 'NR>1 && $6 >= 5 && $5 <= 200 {
              ip=$1
              if (ip ~ /:/) printf("[%s]:443\n", ip)
              else printf("%s:443\n", ip)
            }' result_loose.csv | sort -u > temp.txt
          fi

          # 🔪 核心精简：强制只取前 10 行
          head -n 10 temp.txt > best.txt

      - name: 4. 推送至 Gist
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_PAT: ${{ secrets.GIST_PAT }}
        run: |
          if [ -s best.txt ]; then
            echo "# Updated: $(date '+%Y-%m-%d %H:%M:%S') UTC" > final.txt
            cat best.txt >> final.txt
            
            CONTENT=$(sed ':a;N;$!ba;s/\n/\\n/g' final.txt)
            curl -L -X PATCH \
              -H "Authorization: token $GIST_PAT" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/gists/$GIST_ID \
              -d "{\"files\":{\"my_best_cf_ips.txt\":{\"content\":\"$CONTENT\"}}}"
            echo "✅ 成功推送严格筛选的 10 个神级 IP 至 Gist！"
          else
            echo "❌ 无可用 IP，流程终止"
            exit 1
          fi
