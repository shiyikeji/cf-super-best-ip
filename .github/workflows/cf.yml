      - name: 下载最新 CloudflareST (v2.3.4) - 加强验证版
        run: |
          URL="https://github.com/XIU2/CloudflareSpeedTest/releases/download/v2.3.4/cfst_linux_amd64.tar.gz"
          MIRRORS=(
            "$URL"                            # 优先官方
            "https://ghproxy.com/$URL"
            "https://ghproxy.net/$URL"
            "https://mirror.ghproxy.com/$URL"
            "https://fastly.jsdelivr.net/gh/XIU2/CloudflareSpeedTest@v2.3.4/cfst_linux_amd64.tar.gz"  # jsdelivr 加速（常用于 Releases）
          )

          DOWNLOADED=false
          for mirror in "${MIRRORS[@]}"; do
            echo "尝试从 $mirror 下载..."
            curl -L -f --connect-timeout 15 --retry 2 -o cfst.tar.gz "$mirror"
            if [ $? -eq 0 ] && [ -s cfst.tar.gz ]; then
              # 检查文件大小（真实文件 ≈5-10MB，<2MB 基本是错误页）
              FILE_SIZE=$(stat -c %s cfst.tar.gz 2>/dev/null || stat -f %z cfst.tar.gz)
              if [ "$FILE_SIZE" -gt 2000000 ]; then   # >2MB 才算合理
                echo "下载成功，大小: ${FILE_SIZE} 字节"
                DOWNLOADED=true
                break
              else
                echo "文件太小 (${FILE_SIZE} 字节)，疑似错误页，丢弃..."
                rm -f cfst.tar.gz
              fi
            fi
          done

          if [ "$DOWNLOADED" != "true" ]; then
            echo "❌ 所有源下载失败或文件无效！"
            exit 1
          fi

          # 额外验证：检查是否 gzip 格式
          if ! file cfst.tar.gz | grep -q "gzip compressed data"; then
            echo "❌ 下载的文件不是 gzip 格式！可能是 HTML 错误页。"
            head -n 5 cfst.tar.gz   # 显示前几行看是不是 HTML
            exit 1
          fi

          tar -zxf cfst.tar.gz
          chmod +x CloudflareST
          ls -l CloudflareST
          ./CloudflareST --version   # 输出版本确认运行正常
