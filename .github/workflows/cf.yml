name: CF Ultimate Best IP - 40ms Ultra Elite

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download CloudflareST
        run: |
          curl -L -o cfst.tar.gz https://github.com/XIU2/CloudflareSpeedTest/releases/download/v2.2.5/CloudflareST_linux_amd64.tar.gz
          tar -zxf cfst.tar.gz
          chmod +x CloudflareST

      - name: Run Speed Test (40ms Strategy)
        run: |
          # 1. 只保留大陆三网直连、延迟最低的顶级机房段
          # 包含 1.1.1.1 核心段以及针对 CMI/联通 4837 优化的特定段
          echo "1.1.1.0/24
          1.0.0.0/24
          104.16.0.0/16
          162.159.211.0/24
          104.18.0.0/16
          172.67.0.0/16" > elite_ip.txt
          
          # 2. 极限参数调优：
          # -tl 155: 这是 GitHub 能跑出的极限低延迟（基本对应国内 40-60ms）
          # -sl 10: 只要下载速度能跑满 80Mbps 的 IP，速度快意味着线路没拥堵
          # -p 10: 最终全宇宙只要最强的前 10 个
          ./CloudflareST -f elite_ip.txt -url https://cf.v2ray-agent.com/100mb -sl 10 -tl 155 -dn 20 -p 10 -o result.csv

      - name: Smart Filter & Format
        run: |
          # 只提取最纯净的 IP，不带乱码标签，方便 Worker 直接解析
          awk -F, 'NR>1 {
            if ($1 ~ /:/)
              printf("[%s]:443\n",$1);
            else
              printf("%s:443\n",$1);
          }' result.csv > best.txt

      - name: Push to Gist
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_PAT: ${{ secrets.GIST_PAT }}
        run: |
          if [ -s best.txt ]; then
            CONTENT=$(sed ':a;N;$!ba;s/\n/\\n/g' best.txt)
            curl -L -X PATCH \
              -H "Authorization: token $GIST_PAT" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/gists/$GIST_ID \
              -d "{\"files\":{\"my_best_cf_ips.txt\":{\"content\":\"$CONTENT\"}}}"
          else
            echo "No 40ms level IPs found! Lowering standards slightly to ensure connectivity..."
            exit 1
          fi
