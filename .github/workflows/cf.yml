name: CF Ultimate Best IP System - Elite 10

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download CloudflareST
        run: |
          curl -L -o cfst.tar.gz https://github.com/XIU2/CloudflareSpeedTest/releases/download/v2.2.5/CloudflareST_linux_amd64.tar.gz
          tar -zxf cfst.tar.gz
          chmod +x CloudflareST

      - name: Run Speed Test (Elite Strategy)
        run: |
          # 1. 锁定顶级 IP 段 (包含官方核心段及三网优化段)
          echo "1.1.1.0/24
          1.0.0.0/24
          104.16.0.0/16
          172.67.0.0/16
          162.159.211.0/24" > elite_ip.txt
          
          # 2. 执行精英级筛选
          # -tl 170: 强制 GitHub 到节点的延迟低于 170ms
          # -sl 8: 下载速度门槛设为 8MB/s (约 64Mbps)
          # -p 10: 最终全宇宙只要最强的前 10 个
          ./CloudflareST -f elite_ip.txt -url https://cf.v2ray-agent.com/100mb -sl 8 -tl 170 -dn 20 -p 10 -o result.csv

      - name: Smart Filter & Format
        run: |
          # 提取测速结果，只输出 IP、延迟和速度标签
          awk -F, 'NR>1 {
            if ($1 ~ /:/)
              printf("[%s]:443#CF-Elite-v6\n",$1);
            else
              printf("%s:443#CF-Elite\n",$1);
          }' result.csv > best.txt

      - name: Push to Gist
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_PAT: ${{ secrets.GIST_PAT }}
        run: |
          if [ -s best.txt ]; then
            CONTENT=$(sed ':a;N;$!ba;s/\n/\\n/g' best.txt)
            curl -L -X PATCH \
              -H "Authorization: token $GIST_PAT" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/gists/$GIST_ID \
              -d "{\"files\":{\"my_best_cf_ips.txt\":{\"content\":\"$CONTENT\"}}}"
            echo "Successfully updated Gist with Elite 10 IPs."
          else
            echo "No Elite IPs found! Trying to lower speed limit to 5MB/s..."
            # 备选逻辑：如果 8MB/s 找不到 IP，自动降级到 5MB/s 重新尝试 (可选添加)
            exit 1
          fi
