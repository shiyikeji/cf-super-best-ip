name: CF Ultimate Best IP - Multi-Cloud Proxy (GCP/AWS/Azure)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *" # 缩短为每12小时一次，保证反代IP的新鲜度

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 下载测速程序
        run: |
          URL="https://github.com/XIU2/CloudflareSpeedTest/releases/download/v2.3.4/cfst_linux_amd64.tar.gz"
          curl -L -f --retry 3 -o cfst.tar.gz "$URL"
          tar -zxf cfst.tar.gz && chmod +x cfst

      - name: 2. 注入“大厂反代”核心段
        run: |
          # 核心策略：剔除官方烂大街段，只扫高含金量的反代段
          cat <<EOF > target_ips.txt
          # GCP (谷歌云 - 移动的神)
          34.80.0.0/12
          35.190.0.0/16
          # AWS (亚马逊 - 电信联通极品)
          54.240.0.0/12
          52.64.0.0/10
          # Azure/Oracle (微软/甲骨文 - 小众反代)
          20.190.0.0/16
          150.136.0.0/16
          129.146.0.0/16
          EOF

      - name: 3. 运行测速 (针对反代节点调优)
        run: |
          # 调整说明：
          # -tp 443: 反代节点必须测443端口
          # -tl 350: 因为 Actions 机器在美欧，去连亚太反代延迟较高，必须放宽到350ms，否则搜不到
          # -sl 5: 初始要求 5MB/s，保证质量
          ./cfst -f target_ips.txt -tp 443 -url https://speed.cloudflare.com/__down?bytes=50000000 -sl 5 -tl 350 -dn 30 -p 0 -o result.csv

      - name: 4. 智能过滤与结果格式化
        run: |
          # 只提取 IP:443 格式，并去重
          awk -F, 'NR>1 && $6 >= 5 {
            ip=$1
            if (ip ~ /:/) printf("[%s]:443\n", ip)
            else printf("%s:443\n", ip)
          }' result.csv | head -n 10 > best.txt

          # 如果 5MB/s 没搜到，保底放宽到 2MB/s
          if [ ! -s best.txt ]; then
            echo "⚠️ 严格模式无果，降级至 2MB/s..."
            awk -F, 'NR>1 && $6 >= 2 {
              ip=$1
              if (ip ~ /:/) printf("[%s]:443\n", ip)
              else printf("%s:443\n", ip)
            }' result.csv | head -n 5 > best.txt
          fi

      - name: 5. 推送至 Gist
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_PAT: ${{ secrets.GIST_PAT }}
        run: |
          if [ -s best.txt ]; then
            TIME=$(date '+%Y-%m-%d %H:%M:%S')
            # 加上运营商说明，方便你自己脚本调用时识别
            echo "# Best Proxy IPs Updated at $TIME (UTC)" > final.txt
            cat best.txt >> final.txt
            
            CONTENT=$(sed ':a;N;$!ba;s/\n/\\n/g' final.txt)
            curl -L -X PATCH \
              -H "Authorization: token $GIST_PAT" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/gists/$GIST_ID \
              -d "{\"files\":{\"my_best_cf_ips.txt\":{\"content\":\"$CONTENT\"}}}"
            echo "✅ 成功更新大厂反代 IP 到 Gist！"
          else
            echo "❌ 扫描失败，未发现可用反代 IP"
            exit 1
          fi
