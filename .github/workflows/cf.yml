- name: Run Speed Test (Elite Only)
        run: |
          # 1. 下载针对三网优化的精选 IP 段（不再盲测 2700 个）
          # 我们直接手动指定几个顶级段：1.1.1.0/24, 1.0.0.0/24, 162.159.211.0/24 等
          echo "1.1.1.0/24
          1.0.0.0/24
          104.16.0.0/16
          162.159.211.0/24" > elite_ip.txt
          
          chmod +x CloudflareST
          
          # 2. 核心参数调整：
          # -f elite_ip.txt: 只测这几个精选段
          # -tl 170: 强制 GitHub 延迟低于 170ms（这在美西服务器上属于顶级延迟）
          # -sl 8: 下载速度必须高于 8MB/s (约 64Mbps)，只要最猛的
          # -p 10: 最终全宇宙只要前 10 名
          ./CloudflareST -f elite_ip.txt -url https://cf.v2ray-agent.com/100mb -sl 8 -tl 170 -dn 20 -p 10 -o result.csv
