name: 🚀 每日全自动反代抓取与提纯

on:
  schedule:
    - cron: '0 22 * * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v3

      - name: 🐍 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 安装核心依赖库 
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: ⚡ 运行终极聚合提纯脚本
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_PAT: ${{ secrets.GIST_PAT }}
        run: python main.py
