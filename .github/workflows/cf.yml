name: CF Best IP - GitHub Safe Edition

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *" # 每12小时跑一次

jobs:
  build:
    runs-on: ubuntu-latest
    # 🚨 第一道免死金牌：整个任务最多只允许跑 5 分钟，超时直接强杀！绝对保护你的额度。
    timeout-minutes: 5 

    steps:
      - name: 1. 下载测速程序
        run: |
          URL="https://github.com/XIU2/CloudflareSpeedTest/releases/download/v2.3.4/cfst_linux_amd64.tar.gz"
          curl -L -f --retry 3 -o cfst.tar.gz "$URL"
          tar -zxf cfst.tar.gz && chmod +x cfst

      - name: 2. 写入亚太直连“黄金段”
        run: |
          cat <<EOF > target_ips.txt
          34.80.0.0/12
          35.190.0.0/16
          54.240.0.0/12
          52.64.0.0/10
          20.190.0.0/16
          EOF

      - name: 3. 极速抽样测速 (严格限时)
        run: |
          # 🚨 第二道免死金牌：-n 200
          # 强制只随机抽取 200 个 IP 进行测速，实测 1~2 分钟内必定跑完！
          # -url 换成了 www.google.com，模拟真实的翻墙连通性
          ./cfst -f target_ips.txt -tp 443 -url https://www.google.com -n 200 -sl 3 -tl 200 -dn 10 -p 0 -o result.csv

      - name: 4. 提取最优节点
        run: |
          awk -F, 'NR>1 {
            ip=$1
            if (ip ~ /:/) printf("[%s]:443\n", ip)
            else printf("%s:443\n", ip)
          }' result.csv | head -n 10 > best.txt

      - name: 5. 推送至 Gist
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_PAT: ${{ secrets.GIST_PAT }}
        run: |
          if [ -s best.txt ]; then
            TIME=$(date '+%Y-%m-%d %H:%M:%S')
            echo "# GitHub Safe Scan - Updated at $TIME" > final.txt
            cat best.txt >> final.txt
            CONTENT=$(sed ':a;N;$!ba;s/\n/\\n/g' final.txt)
            curl -L -X PATCH -H "Authorization: token $GIST_PAT" -H "Accept: application/vnd.github+json" https://api.github.com/gists/$GIST_ID -d "{\"files\":{\"my_best_cf_ips.txt\":{\"content\":\"$CONTENT\"}}}"
            echo "✅ 成功推送到 Gist！本次消耗额度极低。"
          else
            echo "❌ 未找到符合条件的 IP"
            exit 1
          fi
